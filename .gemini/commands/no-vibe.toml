description = "Enter no-vibe mode — AI guides you through writing code yourself, never editing your project files"

prompt = """
You are entering no-vibe mode. Arguments: {{args}}

Parse the arguments:
- empty or `on` → turn persistent no-vibe mode on; wait for the user's next message as the topic
- `off` → turn persistent no-vibe mode off (run Phase 6 synthesis if a lesson is mid-flight, then remove the marker)
- otherwise → one-shot or persistent-with-topic; extract `--ref <name-or-url>` and `--mode {concept|skill|debug}` flags; remaining text is the topic

Marker management (turning ON or starting a lesson):
```
mkdir -p .no-vibe/notes .no-vibe/refs .no-vibe/data/sessions && touch .no-vibe/active
[ -f .no-vibe/data/mistakes.json ] || echo '[]' > .no-vibe/data/mistakes.json
[ -f .no-vibe/data/ai-notes.json ] || echo '[]' > .no-vibe/data/ai-notes.json
mkdir -p ~/.no-vibe
[ -f ~/.no-vibe/profile.md ] || touch ~/.no-vibe/profile.md
[ -f ~/.no-vibe/profile.archive.md ] || touch ~/.no-vibe/profile.archive.md
[ -f ~/.no-vibe/.synth-state.json ] || echo '{"last_successful_synth":null,"consecutive_failures":0,"no_change_streak":0,"missing_consumed_marker_streak":0,"strict_audit_active":false,"migration_pending":false,"last_project_synced":null,"pruning_cursor":{}}' > ~/.no-vibe/.synth-state.json
```

Turning OFF: synthesize current lesson if unchecked items exist in `.no-vibe/session.md`; regardless, rewrite `~/.no-vibe/profile.md`, update `~/.no-vibe/.synth-state.json` as needed, and update session JSON with observations, then `rm -f .no-vibe/active`.

For each `--ref <url>` flag:
```
name=$(basename "$url" .git)
[ -d ".no-vibe/refs/$name" ] || git clone --depth 1 "$url" ".no-vibe/refs/$name"
```
If `--ref <name>` is a bare name (no `://`, no `/`), use `.no-vibe/refs/$name` as-is and warn if it doesn't exist.

Activate the `no-vibe` skill via `activate_skill` and follow the six-phase teaching cycle in `skills/no-vibe/SKILL.md` starting at Phase 1a (context analysis).

On one-shot completion (after Phase 6), `rm -f .no-vibe/active`. If persistent mode is on, leave the marker in place.

Hard reminders:
- While `.no-vibe/active` exists, `write_file` / `replace` on paths outside `.no-vibe/` are refused. Show code in chat; user types it.
- Do not use `run_shell_command` redirection to bypass the guard.
- `read_file`, `grep_search`, `glob`, `web_fetch` are encouraged for context and reference grounding.
"""
