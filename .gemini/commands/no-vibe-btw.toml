description = "One-shot escape hatch — let AI write code to project files for a single task, then restore no-vibe mode"

prompt = """
One-shot escape from no-vibe mode. Do a single task that writes to project files, then restore the no-vibe marker if it was active.

Task: {{args}}

Steps:

1. Validate: if the task is empty, stop and tell the user:
   `/no-vibe-btw requires a task description. Example: /no-vibe-btw add a .gitignore for node`.

2. Snapshot marker state:
   ```
   was_active=0
   [ -f .no-vibe/active ] && was_active=1
   ```

3. Disable the guard for this task:
   ```
   rm -f .no-vibe/active
   ```
   `write_file` / `replace` on project files will now succeed.

4. Execute the task — exactly what was asked, nothing more:
   - One task only. No scope creep, no "while I'm here" cleanup.
   - No refactors of untouched code.
   - No new abstractions beyond what the task requires.
   - If the task is ambiguous or huge, stop and ask the user to narrow it before writing.

5. Restore the marker — always, even on failure:
   ```
   if [ "$was_active" = "1" ]; then
       mkdir -p .no-vibe && touch .no-vibe/active
   fi
   ```

6. Report: one short summary — files changed + one-line rationale. No trailing narration. If no-vibe was active before, remind the user it's back on.

Hard rules:
- Single task. One-shot. No persistent mode.
- Always restore `.no-vibe/active` if it was set — even on error.
- Do not touch `.no-vibe/` contents unless the task is explicitly about them.
- For a full exit, use `/no-vibe off` instead.
"""
